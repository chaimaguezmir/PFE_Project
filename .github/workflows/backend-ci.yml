name: Backend CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  backend-build:
    name: Build & Test Spring Boot
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: back-end

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "maven"

      - name: Build and test
        run: mvn clean verify

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: afya-backend-jar
          path: back-end/target/*.jar
          retention-days: 3