name: flutter_mobile
description: "A new Flutter project."

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8
  flutter_native_splash: ^2.4.6
  flutter_bloc: ^9.1.1
  # for declarative, URL-based routing
  go_router: ^15.1.2
  dartz: ^0.10.1
  dio: ^5.8.0+1
  logger: ^2.5.0
  get_it: ^8.0.3
  equatable: ^2.0.7
  shared_preferences: ^2.5.3
  flutter_svg: ^2.1.0
  fan_carousel_image_slider: ^1.3.0
  smooth_page_indicator: ^1.2.1
  flutter_screenutil: ^5.9.3

dev_dependencies:
  flutter_test:
    sdk: flutter



  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - lib/config/assets/images/

