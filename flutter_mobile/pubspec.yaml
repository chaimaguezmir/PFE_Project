name: flutter_mobile
description: "A new Flutter project."

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8
  flutter_native_splash: ^2.4.6
  flutter_bloc: ^9.1.1
  # for declarative, URL-based routing
  go_router: ^15.1.2
  dartz: ^0.10.1
  dio: ^5.8.0+1
  logger: ^2.5.0
  get_it: ^8.0.3
  equatable: ^2.0.7
  shared_preferences: ^2.5.3
  flutter_svg: ^2.1.0
  fan_carousel_image_slider: ^1.3.0
  smooth_page_indicator: ^1.2.1
  flutter_screenutil: ^5.9.3
  formz: ^0.8.0
  flutter_otp_text_field: ^1.5.1+1
  mockito: ^5.4.6
  flutter_social_button: ^1.1.6+1
  device_info_plus: ^11.4.0
  connectivity_plus: ^6.1.4
  qr_flutter: ^4.1.0
  image_picker: ^1.1.2
  get: ^4.7.2
  google_sign_in: ^6.1.4
  mobile_scanner: ^7.0.1
  http_parser: ^4.0.2


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  bloc_lint: ^0.2.0-dev.4

flutter:
  uses-material-design: true
  assets:
    - lib/config/assets/images/
    - lib/config/assets/icons/
  fonts:
    - family: Roboto
      fonts:
        - asset: lib/config/assets/fonts/Roboto/Roboto-Regular.ttf
          weight: 400
        - asset: lib/config/assets/fonts/Roboto/Roboto-Medium.ttf
          weight: 500
        - asset: lib/config/assets/fonts/Roboto/Roboto-Bold.ttf
          weight: 700
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg


