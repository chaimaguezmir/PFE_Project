<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fdeaf4"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#1597a8"/>
      <stop offset="1" stop-color="#17345c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="9" stdDeviation="9" flood-color="#17345c" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#16a34a"/>
    </marker>
    <style>
      .title { font: 700 50px Arial, sans-serif; fill: #17345c; }
      .subtitle { font: 400 23px Arial, sans-serif; fill: #53677f; }
      .card-title { font: 700 28px Arial, sans-serif; fill: #17345c; }
      .big { font: 800 54px Arial, sans-serif; fill: #17345c; }
      .metric { font: 800 46px Arial, sans-serif; fill: #0f8a9d; }
      .text { font: 400 23px Arial, sans-serif; fill: #263b56; }
      .small { font: 400 18px Arial, sans-serif; fill: #5b6f89; }
      .source { font: 400 16px Arial, sans-serif; fill: #667085; }
      .card { fill: #ffffff; stroke: #b7d7f2; stroke-width: 2; filter: url(#shadow); }
      .soft { fill: #eef8fb; stroke: #a8d8e2; stroke-width: 2; }
      .axis { stroke: #9fb7d4; stroke-width: 2; }
      .green { fill: #16a34a; }
      .orange { fill: #f97316; }
      .purple { fill: #7c3aed; }
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <path d="M70 105 H560 M1360 105 H1850" stroke="#0f8a9d" stroke-width="3" opacity="0.45"/>
  <text x="960" y="75" text-anchor="middle" class="title">Transformation numérique de la santé</text>
  <text x="960" y="115" text-anchor="middle" class="subtitle">Une croissance mondiale portée par la télésanté, les logiciels médicaux, les données et les services connectés</text>

  <!-- Main market card -->
  <rect x="90" y="175" width="850" height="650" rx="26" class="card"/>
  <text x="150" y="235" class="card-title">Marché mondial de la santé numérique</text>
  <text x="150" y="278" class="text">Taille estimée et projection du marché global</text>

  <!-- Chart axis -->
  <line x1="180" y1="700" x2="810" y2="700" class="axis"/>
  <line x1="180" y1="355" x2="180" y2="700" class="axis"/>

  <!-- 2025 bar -->
  <rect x="290" y="592" width="150" height="108" rx="12" fill="#9edbe4"/>
  <text x="365" y="565" text-anchor="middle" class="big">347,4</text>
  <text x="365" y="725" text-anchor="middle" class="text">2025</text>
  <text x="365" y="755" text-anchor="middle" class="small">Mds USD</text>

  <!-- 2033 bar -->
  <rect x="585" y="330" width="150" height="370" rx="12" fill="url(#bar)"/>
  <text x="660" y="303" text-anchor="middle" class="big">1 830,4</text>
  <text x="660" y="725" text-anchor="middle" class="text">2033</text>
  <text x="660" y="755" text-anchor="middle" class="small">Mds USD</text>

  <!-- Growth arrow -->
  <path d="M440 540 C500 480, 540 430, 590 365" stroke="#16a34a" stroke-width="6" fill="none" marker-end="url(#arrow)"/>
  <rect x="430" y="420" width="190" height="70" rx="18" fill="#f3fff6" stroke="#98d9b6" stroke-width="2"/>
  <text x="525" y="449" text-anchor="middle" class="metric">+23,4%</text>
  <text x="525" y="476" text-anchor="middle" class="small">CAGR 2026-2033</text>

  <!-- Right metrics -->
  <rect x="1000" y="175" width="380" height="205" rx="24" class="card"/>
  <circle cx="1070" cy="260" r="48" fill="#eef8fb" stroke="#0f8a9d" stroke-width="3"/>
  <text x="1070" y="273" text-anchor="middle" class="metric">44,7%</text>
  <text x="1145" y="235" class="card-title">Télésanté</text>
  <text x="1145" y="275" class="text">segment dominant</text>
  <text x="1145" y="307" class="small">part de marché par technologie en 2025</text>

  <rect x="1450" y="175" width="380" height="205" rx="24" class="card"/>
  <circle cx="1520" cy="260" r="48" fill="#fff7ed" stroke="#f97316" stroke-width="3"/>
  <text x="1520" y="273" text-anchor="middle" class="metric" fill="#f97316">45,7%</text>
  <text x="1595" y="235" class="card-title">Logiciels</text>
  <text x="1595" y="275" class="text">premier composant</text>
  <text x="1595" y="307" class="small">part de revenus en 2025</text>

  <rect x="1000" y="430" width="830" height="190" rx="24" class="card"/>
  <text x="1060" y="488" class="card-title">Pourquoi cette évolution ?</text>
  <rect x="1060" y="525" width="210" height="55" rx="16" class="soft"/>
  <text x="1165" y="560" text-anchor="middle" class="text">Télémédecine</text>
  <rect x="1300" y="525" width="210" height="55" rx="16" class="soft"/>
  <text x="1405" y="560" text-anchor="middle" class="text">mHealth</text>
  <rect x="1540" y="525" width="210" height="55" rx="16" class="soft"/>
  <text x="1645" y="560" text-anchor="middle" class="text">Données santé</text>

  <rect x="1000" y="670" width="830" height="155" rx="24" class="card"/>
  <text x="1060" y="727" class="card-title">Lien avec AFYA</text>
  <text x="1060" y="772" class="text">AFYA s’inscrit dans cette transformation : suivi mobile, ordonnances numériques, rappels, stock pharmacie, scan QR et assistance IA.</text>

  <!-- Bottom source band -->
  <rect x="90" y="875" width="1740" height="120" rx="22" fill="#ffffff" stroke="#d6e8f8" stroke-width="2"/>
  <text x="130" y="918" class="source">Sources : Grand View Research, Digital Health Market Size &amp; Share Report 2026-2033 ; OMS, Global strategy on digital health 2020-2025.</text>
  <text x="130" y="953" class="source">Chiffres utilisés : marché 2025 = 347,4 Mds USD ; projection 2033 = 1 830,4 Mds USD ; CAGR 2026-2033 = 23,4% ; télésanté = 44,7% ; logiciels = 45,7%.</text>
</svg>
