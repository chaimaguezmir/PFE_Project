<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fdeaf4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#17345c" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L11,6.5 L2,11 Z" fill="#17345c"/>
    </marker>
    <marker id="arrowTeal" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L11,6.5 L2,11 Z" fill="#0f8a9d"/>
    </marker>
    <style>
      .title { font: 700 48px Arial, sans-serif; fill: #17345c; }
      .subtitle { font: 500 21px Arial, sans-serif; fill: #53677f; }
      .section-title { font: 700 25px Arial, sans-serif; fill: #ffffff; }
      .card-title { font: 700 24px Arial, sans-serif; fill: #17345c; }
      .text { font: 400 20px Arial, sans-serif; fill: #263b56; }
      .small { font: 400 17px Arial, sans-serif; fill: #53677f; }
      .tiny { font: 600 15px Arial, sans-serif; fill: #17345c; }
      .num { font: 800 22px Arial, sans-serif; fill: #ffffff; }
      .zone { fill: #ffffff; stroke: #b7d7f2; stroke-width: 2; filter: url(#shadow); }
      .header-blue { fill: #17345c; }
      .header-teal { fill: #0f8a9d; }
      .header-green { fill: #16a34a; }
      .header-orange { fill: #f97316; }
      .header-purple { fill: #7c3aed; }
      .pill { fill: #f8fffb; stroke: #8bd2ab; stroke-width: 2; }
      .flow { stroke: #17345c; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .return { stroke: #0f8a9d; stroke-width: 3; fill: none; stroke-dasharray: 9 8; marker-end: url(#arrowTeal); }
      .soft-line { stroke: #91abc8; stroke-width: 2.5; fill: none; }
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <text x="960" y="62" text-anchor="middle" class="title">Architecture logique - Projet AFYA</text>
  <text x="960" y="100" text-anchor="middle" class="subtitle">Lecture du flux : une action utilisateur traverse les couches applicatives jusqu’aux données et services externes</text>

  <!-- Main flow cards -->
  <rect x="70" y="155" width="330" height="575" rx="22" class="zone"/>
  <rect x="70" y="155" width="330" height="58" rx="22" class="header-teal"/>
  <text x="235" y="192" text-anchor="middle" class="section-title">1. Interfaces</text>

  <rect x="445" y="155" width="330" height="575" rx="22" class="zone"/>
  <rect x="445" y="155" width="330" height="58" rx="22" class="header-blue"/>
  <text x="610" y="192" text-anchor="middle" class="section-title">2. Logique front</text>

  <rect x="820" y="155" width="330" height="575" rx="22" class="zone"/>
  <rect x="820" y="155" width="330" height="58" rx="22" class="header-purple"/>
  <text x="985" y="192" text-anchor="middle" class="section-title">3. API sécurisée</text>

  <rect x="1195" y="155" width="330" height="575" rx="22" class="zone"/>
  <rect x="1195" y="155" width="330" height="58" rx="22" class="header-green"/>
  <text x="1360" y="192" text-anchor="middle" class="section-title">4. Métier backend</text>

  <rect x="1570" y="155" width="280" height="575" rx="22" class="zone"/>
  <rect x="1570" y="155" width="280" height="58" rx="22" class="header-orange"/>
  <text x="1710" y="192" text-anchor="middle" class="section-title">5. Données</text>

  <!-- Number badges and card content -->
  <circle cx="105" cy="245" r="23" fill="#0f8a9d"/>
  <text x="105" y="253" text-anchor="middle" class="num">1</text>
  <text x="145" y="244" class="card-title">Applications</text>
  <text x="110" y="292" class="text">Flutter Mobile</text>
  <text x="110" y="324" class="small">patient, médecin, infirmier,</text>
  <text x="110" y="350" class="small">pharmacien, admin établissement</text>
  <text x="110" y="395" class="text">Back-office React</text>
  <text x="110" y="427" class="small">admin système, audit, alertes</text>
  <text x="110" y="472" class="text">Module scanner</text>
  <text x="110" y="504" class="small">QR ordonnance, code-barres,</text>
  <text x="110" y="530" class="small">affectation membre</text>
  <rect x="108" y="590" width="255" height="72" rx="14" fill="#eef8fb" stroke="#b7d7f2"/>
  <text x="235" y="618" text-anchor="middle" class="tiny">Action utilisateur</text>
  <text x="235" y="645" text-anchor="middle" class="small">ex. créer ordonnance, scanner QR,</text>
  <text x="235" y="668" text-anchor="middle" class="small">consulter rappels ou stock</text>

  <circle cx="480" cy="245" r="23" fill="#17345c"/>
  <text x="480" y="253" text-anchor="middle" class="num">2</text>
  <text x="520" y="244" class="card-title">Couches client</text>
  <text x="485" y="292" class="text">Présentation</text>
  <text x="485" y="322" class="small">écrans, widgets, pages web</text>
  <text x="485" y="367" class="text">BLoC / Cubit</text>
  <text x="485" y="397" class="small">gestion des états et événements</text>
  <text x="485" y="442" class="text">Domain</text>
  <text x="485" y="472" class="small">entités et contrats repositories</text>
  <text x="485" y="517" class="text">Data</text>
  <text x="485" y="547" class="small">models, Dio/Axios, sources API</text>
  <rect x="485" y="590" width="245" height="72" rx="14" fill="#eef8fb" stroke="#b7d7f2"/>
  <text x="608" y="618" text-anchor="middle" class="tiny">But</text>
  <text x="608" y="645" text-anchor="middle" class="small">préparer une requête HTTP</text>
  <text x="608" y="668" text-anchor="middle" class="small">avec token JWT</text>

  <circle cx="855" cy="245" r="23" fill="#7c3aed"/>
  <text x="855" y="253" text-anchor="middle" class="num">3</text>
  <text x="895" y="244" class="card-title">Backend API</text>
  <text x="860" y="292" class="text">Controllers REST</text>
  <text x="860" y="322" class="small">endpoints /api</text>
  <text x="860" y="367" class="text">Sécurité</text>
  <text x="860" y="397" class="small">JWT, Spring Security, rôles</text>
  <text x="860" y="442" class="text">Validation</text>
  <text x="860" y="472" class="small">DTO, payloads, permissions</text>
  <rect x="860" y="545" width="245" height="86" rx="14" fill="#f8f4ff" stroke="#c7b7f2"/>
  <text x="982" y="575" text-anchor="middle" class="tiny">Exemples API</text>
  <text x="982" y="602" text-anchor="middle" class="small">/auth, /prescriptions, /stock</text>
  <text x="982" y="625" text-anchor="middle" class="small">/ordonnances, /chat</text>

  <circle cx="1230" cy="245" r="23" fill="#16a34a"/>
  <text x="1230" y="253" text-anchor="middle" class="num">4</text>
  <text x="1270" y="244" class="card-title">Services métier</text>
  <text x="1235" y="292" class="text">Règles fonctionnelles</text>
  <text x="1235" y="322" class="small">prescriptions, traitements, groupes</text>
  <text x="1235" y="367" class="text">Ordonnances</text>
  <text x="1235" y="397" class="small">génération PDF et QR public</text>
  <text x="1235" y="442" class="text">Pharmacie</text>
  <text x="1235" y="472" class="small">stock, péremption, transferts</text>
  <text x="1235" y="517" class="text">Assistance</text>
  <text x="1235" y="547" class="small">chat IA, notifications, rappels</text>
  <rect x="1235" y="590" width="245" height="72" rx="14" fill="#f3fff6" stroke="#98d9b6"/>
  <text x="1358" y="618" text-anchor="middle" class="tiny">But</text>
  <text x="1358" y="645" text-anchor="middle" class="small">appliquer la logique métier</text>
  <text x="1358" y="668" text-anchor="middle" class="small">et orchestrer les modules</text>

  <circle cx="1605" cy="245" r="23" fill="#f97316"/>
  <text x="1605" y="253" text-anchor="middle" class="num">5</text>
  <text x="1645" y="244" class="card-title">Persistance</text>
  <text x="1608" y="292" class="text">MySQL / MariaDB</text>
  <text x="1608" y="322" class="small">users, rôles, prescriptions,</text>
  <text x="1608" y="348" class="small">traitements, stock</text>
  <text x="1608" y="393" class="text">Fichiers serveur</text>
  <text x="1608" y="423" class="small">PDF ordonnances, uploads, logs</text>
  <text x="1608" y="468" class="text">Services externes</text>
  <text x="1608" y="498" class="small">Firebase, Gmail, OpenFDA,</text>
  <text x="1608" y="524" class="small">Groq/LLM, OpenStreetMap</text>
  <rect x="1608" y="590" width="205" height="72" rx="14" fill="#fff7ed" stroke="#f3c77b"/>
  <text x="1710" y="618" text-anchor="middle" class="tiny">Résultat</text>
  <text x="1710" y="645" text-anchor="middle" class="small">données sauvegardées</text>
  <text x="1710" y="668" text-anchor="middle" class="small">ou service déclenché</text>

  <!-- Main arrows -->
  <path d="M400 445 H445" class="flow"/>
  <path d="M775 445 H820" class="flow"/>
  <path d="M1150 445 H1195" class="flow"/>
  <path d="M1525 445 H1570" class="flow"/>
  <text x="422" y="425" text-anchor="middle" class="tiny">événement</text>
  <text x="798" y="425" text-anchor="middle" class="tiny">HTTP + JWT</text>
  <text x="1173" y="425" text-anchor="middle" class="tiny">service</text>
  <text x="1548" y="425" text-anchor="middle" class="tiny">JPA / API</text>

  <!-- Return path -->
  <path d="M1710 735 C1500 800, 1200 820, 960 810 C700 800, 430 760, 235 735" class="return"/>
  <text x="960" y="848" text-anchor="middle" class="tiny">Retour : réponse JSON, notification, PDF, données affichées dans l’interface</text>

  <!-- Functional blocks -->
  <rect x="95" y="885" width="1730" height="145" rx="22" fill="#ffffff" stroke="#98d9b6" stroke-width="2" filter="url(#shadow)"/>
  <text x="960" y="922" text-anchor="middle" class="card-title">Domaines fonctionnels reliés à cette architecture</text>

  <rect x="145" y="950" width="170" height="42" rx="12" class="pill"/>
  <text x="230" y="977" text-anchor="middle" class="tiny">Auth &amp; switch role</text>
  <rect x="330" y="950" width="150" height="42" rx="12" class="pill"/>
  <text x="405" y="977" text-anchor="middle" class="tiny">Groupes</text>
  <rect x="495" y="950" width="160" height="42" rx="12" class="pill"/>
  <text x="575" y="977" text-anchor="middle" class="tiny">Rappels</text>
  <rect x="670" y="950" width="175" height="42" rx="12" class="pill"/>
  <text x="758" y="977" text-anchor="middle" class="tiny">Prescriptions</text>
  <rect x="860" y="950" width="180" height="42" rx="12" class="pill"/>
  <text x="950" y="977" text-anchor="middle" class="tiny">Ordonnances QR</text>
  <rect x="1055" y="950" width="170" height="42" rx="12" class="pill"/>
  <text x="1140" y="977" text-anchor="middle" class="tiny">Stock</text>
  <rect x="1240" y="950" width="170" height="42" rx="12" class="pill"/>
  <text x="1325" y="977" text-anchor="middle" class="tiny">Transferts</text>
  <rect x="1425" y="950" width="180" height="42" rx="12" class="pill"/>
  <text x="1515" y="977" text-anchor="middle" class="tiny">Scan QR/code</text>
  <rect x="1620" y="950" width="160" height="42" rx="12" class="pill"/>
  <text x="1700" y="977" text-anchor="middle" class="tiny">IA &amp; vocal</text>
</svg>
