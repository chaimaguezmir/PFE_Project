    <text class="week" x="921.7" y="62" text-anchor="middle">S13</text>
    <text class="week" x="965.0" y="62" text-anchor="middle">S14</text>
    <text class="week" x="1008.3" y="62" text-anchor="middle">S15</text>
    <text class="week" x="1051.7" y="62" text-anchor="middle">S16</text>
    <text class="week" x="1095.0" y="62" text-anchor="middle">S17</text>
    <text class="week" x="1138.3" y="62" text-anchor="middle">S18</text>
    <text class="week" x="1181.7" y="62" text-anchor="middle">S19</text>
    <text class="week" x="1225.0" y="62" text-anchor="middle">S20</text>
    <text class="week" x="1268.3" y="62" text-anchor="middle">S21</text>
    <text class="week" x="1311.7" y="62" text-anchor="middle">S22</text>
    <text class="week" x="1355.0" y="62" text-anchor="middle">S23</text>
    <text class="week" x="1398.3" y="62" text-anchor="middle">S24</text>
