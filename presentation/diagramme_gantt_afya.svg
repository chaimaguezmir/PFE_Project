    <rect x="683.3" y="311.0" width="433.3" height="38" rx="9" fill="#0891b2"/>
    <text class="barText" x="900.0" y="330.0" text-anchor="middle" dominant-baseline="central">Application mobile</text>
    <rect x="856.7" y="380.0" width="303.3" height="38" rx="9" fill="#ea580c"/>
    <text class="barText" x="1008.3" y="399.0" text-anchor="middle" dominant-baseline="central">Application web</text>
    <rect x="986.7" y="449.0" width="216.7" height="38" rx="9" fill="#16a34a"/>
    <text class="barText" x="1095.0" y="468.0" text-anchor="middle" dominant-baseline="central">Services externes</text>
    <rect x="1160.0" y="518.0" width="173.3" height="38" rx="9" fill="#dc2626"/>
    <text class="barText" x="1246.7" y="537.0" text-anchor="middle" dominant-baseline="central">Validation</text>
    <rect x="1290.0" y="587.0" width="130.0" height="38" rx="9" fill="#334155"/>
    <text class="barText" x="1355.0" y="606.0" text-anchor="middle" dominant-baseline="central">Livraison</text>
    <polygon points="596.7,180.0 608.7,192.0 596.7,204.0 584.7,192.0" fill="#f59e0b"/>
    <text class="milestoneText" x="614.7" y="200.0">Architecture validee</text>
    <polygon points="943.3,249.0 955.3,261.0 943.3,273.0 931.3,261.0" fill="#f59e0b"/>
    <text class="milestoneText" x="961.3" y="269.0">Backend stable</text>
    <polygon points="1116.7,387.0 1128.7,399.0 1116.7,411.0 1104.7,399.0" fill="#f59e0b"/>
    <text class="milestoneText" x="1134.7" y="407.0">Mobile et web integres</text>
    <polygon points="1333.3,525.0 1345.3,537.0 1333.3,549.0 1321.3,537.0" fill="#f59e0b"/>
    <text class="milestoneText" x="1298.3" y="579.0">Recette finale</text>
