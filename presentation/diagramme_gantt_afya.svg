      <line x1="173.3" y1="0" x2="173.3" y2="576" class="monthLine"/>
      <line x1="346.7" y1="0" x2="346.7" y2="576" class="monthLine"/>
      <line x1="520.0" y1="0" x2="520.0" y2="576" class="monthLine"/>
      <line x1="693.3" y1="0" x2="693.3" y2="576" class="monthLine"/>
      <line x1="866.7" y1="0" x2="866.7" y2="576" class="monthLine"/>
      <line x1="1040.0" y1="0" x2="1040.0" y2="576" class="monthLine"/>
