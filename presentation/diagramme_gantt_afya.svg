<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Diagramme de Gantt professionnel du projet Afya</title>
  <desc id="desc">Planning du projet Afya sur 6 mois, du 1er mars a aout 2026, pour les applications mobile et web.</desc>
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef6f4"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <style>
      .title { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 46px; font-weight: 800; fill: #0f172a; }
      .subtitle { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 22px; font-weight: 500; fill: #475569; }
      .label { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 21px; font-weight: 650; fill: #172033; }
      .small { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 17px; font-weight: 500; fill: #64748b; }
      .month { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 19px; font-weight: 800; fill: #334155; }
      .week { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 12px; font-weight: 650; fill: #94a3b8; }
      .barText { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 16px; font-weight: 750; fill: #ffffff; }
      .milestoneText { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 15px; font-weight: 750; fill: #1e293b; }
      .grid { stroke: #dbe5ea; stroke-width: 1; }
      .monthLine { stroke: #cbd5e1; stroke-width: 2; }
      .rowLine { stroke: #e8eef2; stroke-width: 1; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#pageBg)"/>
  <g transform="translate(70 54)">
    <text class="title" x="0" y="0" dominant-baseline="hanging">Planning du projet Afya</text>
    <text class="subtitle" x="0" y="62" dominant-baseline="hanging">Diagramme de Gantt - Application mobile et web - 1er mars 2026 a aout 2026</text>
    <g transform="translate(1224 0)">
      <rect x="0" y="0" width="236" height="58" rx="10" fill="#0f766e"/>
      <text x="118" y="29" text-anchor="middle" dominant-baseline="central" style="font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 20px; font-weight: 800; fill: white;">Projet de fin d'etudes</text>
    </g>
  </g>
  <g filter="url(#softShadow)">
    <rect x="70" y="150" width="1460" height="660" rx="14" fill="#ffffff"/>
  </g>
  <g transform="translate(70 150)">
