      <text class="small" x="0" y="188">JWT, roles, services, BDD</text>
      <line x1="0" y1="214" x2="1400" y2="214" class="rowLine"/>
      <text class="label" x="0" y="233">Application mobile</text>
      <text class="small" x="0" y="257">Flutter, ecrans, etats, API</text>
      <line x1="0" y1="283" x2="1400" y2="283" class="rowLine"/>
      <text class="label" x="0" y="302">Application web</text>
      <text class="small" x="0" y="326">Tableaux de bord, gestion, API</text>
      <line x1="0" y1="352" x2="1400" y2="352" class="rowLine"/>
