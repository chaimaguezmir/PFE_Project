<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fde8f3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#17345c" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#17345c"/>
    </marker>
    <style>
      .title { font: 700 48px Arial, sans-serif; fill: #17345c; }
      .zone-title { font: 700 25px Arial, sans-serif; fill: #ffffff; }
      .card-title { font: 700 24px Arial, sans-serif; fill: #17345c; }
      .text { font: 400 21px Arial, sans-serif; fill: #30445f; }
      .small { font: 400 19px Arial, sans-serif; fill: #5b6f89; }
      .footer { font: 600 22px Arial, sans-serif; fill: #17345c; }
      .zone { fill: rgba(255,255,255,0.6); stroke: #0f8a9d; stroke-width: 3; stroke-dasharray: 10 10; }
      .card { fill: #ffffff; stroke: #b7d7f2; stroke-width: 2; filter: url(#shadow); }
      .arrow { stroke: #17345c; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .connector { stroke: #6b8bb0; stroke-width: 3; fill: none; }
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <path d="M60 100 H600 M1320 100 H1860" stroke="#0f8a9d" stroke-width="3" opacity="0.45"/>
  <path d="M80 92 c20 -28 34 28 54 0 c20 -28 34 28 54 0" fill="none" stroke="#0f8a9d" stroke-width="3" opacity="0.75"/>
  <text x="960" y="78" text-anchor="middle" class="title">Architecture physique - Projet AFYA</text>

  <!-- Zones -->
  <rect x="70" y="135" width="500" height="820" rx="26" class="zone"/>
  <rect x="710" y="135" width="500" height="820" rx="26" class="zone"/>
  <rect x="1350" y="135" width="500" height="820" rx="26" class="zone"/>

  <rect x="120" y="160" width="400" height="48" rx="14" fill="#0f8a9d"/>
  <text x="320" y="193" text-anchor="middle" class="zone-title">Terminaux utilisateurs</text>
  <rect x="760" y="160" width="400" height="48" rx="14" fill="#17345c"/>
  <text x="960" y="193" text-anchor="middle" class="zone-title">Serveur applicatif</text>
  <rect x="1400" y="160" width="400" height="48" rx="14" fill="#0f8a9d"/>
  <text x="1600" y="193" text-anchor="middle" class="zone-title">Services externes</text>

  <!-- Left cards -->
  <rect x="120" y="250" width="400" height="170" rx="18" class="card"/>
  <text x="225" y="292" class="card-title">📱 Flutter Mobile</text>
  <text x="158" y="330" class="text">Patients • Médecins • Infirmiers</text>
  <text x="158" y="362" class="text">Pharmaciens • Admin établissement</text>
  <text x="158" y="394" class="text">Switch role</text>

  <rect x="120" y="470" width="400" height="150" rx="18" class="card"/>
  <text x="225" y="512" class="card-title">🖥️ Back-office React</text>
  <text x="158" y="550" class="text">Admin système</text>
  <text x="158" y="582" class="text">Supervision • Audit • Alertes</text>

  <rect x="120" y="670" width="400" height="150" rx="18" class="card"/>
  <text x="225" y="712" class="card-title">▣ Module Scanner</text>
  <text x="158" y="750" class="text">QR ordonnance</text>
  <text x="158" y="782" class="text">Code-barres • Affectation membre</text>

  <!-- Center cards -->
  <rect x="760" y="250" width="400" height="255" rx="20" class="card"/>
  <text x="865" y="292" class="card-title">🛡️ Backend Spring Boot</text>
  <text x="800" y="334" class="text">API REST sécurisée /api</text>
  <text x="800" y="370" class="text">Port 8081</text>
  <text x="800" y="406" class="text">JWT + Spring Security</text>
  <text x="800" y="442" class="text">Rôles &amp; permissions</text>
  <text x="800" y="478" class="text">Synchronisation mobile/web</text>

  <rect x="755" y="605" width="130" height="140" rx="16" class="card"/>
  <text x="820" y="653" text-anchor="middle" class="card-title">MySQL</text>
  <text x="820" y="690" text-anchor="middle" class="small">Données</text>
  <text x="820" y="718" text-anchor="middle" class="small">métier</text>

  <rect x="895" y="605" width="130" height="140" rx="16" class="card"/>
  <text x="960" y="646" text-anchor="middle" class="card-title">PDF</text>
  <text x="960" y="683" text-anchor="middle" class="small">uploads /</text>
  <text x="960" y="711" text-anchor="middle" class="small">ordonnances</text>

  <rect x="1035" y="605" width="130" height="140" rx="16" class="card"/>
  <text x="1100" y="646" text-anchor="middle" class="card-title">Logs</text>
  <text x="1100" y="683" text-anchor="middle" class="small">afya.log</text>
  <text x="1100" y="711" text-anchor="middle" class="small">audit</text>

  <path d="M960 505 V575" class="connector"/>
  <path d="M820 575 H1100" class="connector"/>
  <path d="M820 575 V605 M960 575 V605 M1100 575 V605" class="connector"/>

  <!-- Right cards -->
  <rect x="1410" y="235" width="380" height="105" rx="16" class="card"/>
  <text x="1450" y="278" class="card-title">☁ Firebase FCM</text>
  <text x="1450" y="312" class="text">Notifications push</text>

  <rect x="1410" y="370" width="380" height="105" rx="16" class="card"/>
  <text x="1450" y="413" class="card-title">✉ SMTP Gmail</text>
  <text x="1450" y="447" class="text">Emails d’activation</text>

  <rect x="1410" y="505" width="380" height="105" rx="16" class="card"/>
  <text x="1450" y="548" class="card-title">💊 OpenFDA</text>
  <text x="1450" y="582" class="text">Informations médicaments</text>

  <rect x="1410" y="640" width="380" height="105" rx="16" class="card"/>
  <text x="1450" y="683" class="card-title">🤖 Groq / LLM</text>
  <text x="1450" y="717" class="text">Assistant IA</text>

  <rect x="1410" y="775" width="380" height="105" rx="16" class="card"/>
  <text x="1450" y="818" class="card-title">📍 OpenStreetMap</text>
  <text x="1450" y="852" class="text">Pharmacies proches</text>

  <!-- Arrows and labels -->
  <path d="M570 510 H710" class="arrow"/>
  <rect x="590" y="450" width="105" height="52" rx="12" fill="#ffffff" stroke="#b7d7f2"/>
  <text x="642" y="472" text-anchor="middle" class="small">HTTP/JSON</text>
  <text x="642" y="494" text-anchor="middle" class="small">+ JWT</text>

  <path d="M1210 390 H1350" class="arrow"/>
  <rect x="1230" y="332" width="105" height="52" rx="12" fill="#ffffff" stroke="#b7d7f2"/>
  <text x="1282" y="354" text-anchor="middle" class="small">API / SMTP</text>
  <text x="1282" y="376" text-anchor="middle" class="small">/ Push</text>

  <path d="M1350 560 H1210" class="arrow" marker-end="url(#arrow)" transform="scale(-1,1) translate(-2560,0)" opacity="0"/>

  <text x="960" y="1015" text-anchor="middle" class="footer">Déploiement local : http://192.168.100.6:8081</text>
</svg>
