<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fde8f3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#18345f" flood-opacity="0.16"/>
    </filter>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #18345f; }
      .text { font: 400 19px Arial, sans-serif; fill: #213a5f; }
      .center { font: 800 66px Arial, sans-serif; fill: #1b5796; letter-spacing: 2px; }
      .small { font: 600 18px Arial, sans-serif; fill: #ffffff; }
      .card { fill: #ffffff; stroke-width: 3; filter: url(#shadow); }
      .ring { fill: none; stroke: #9cb5d8; stroke-width: 3; stroke-dasharray: 10 12; }
      .link { stroke-width: 3; stroke-dasharray: 8 10; fill: none; }
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Connector ring -->
  <circle cx="960" cy="540" r="320" class="ring"/>
  <line x1="960" y1="345" x2="960" y2="425" class="link" stroke="#1f9d55"/>
  <line x1="1178" y1="408" x2="1076" y2="470" class="link" stroke="#f28b20"/>
  <line x1="1215" y1="655" x2="1088" y2="602" class="link" stroke="#7d4cc2"/>
  <line x1="960" y1="790" x2="960" y2="665" class="link" stroke="#2977c9"/>
  <line x1="665" y1="655" x2="840" y2="602" class="link" stroke="#d1324c"/>
  <line x1="625" y1="405" x2="845" y2="475" class="link" stroke="#0f92a0"/>
  <line x1="1185" y1="260" x2="1057" y2="445" class="link" stroke="#1f9d55"/>
  <line x1="735" y1="260" x2="890" y2="445" class="link" stroke="#0f92a0"/>

  <!-- Center node -->
  <circle cx="960" cy="540" r="145" fill="#ffffff" stroke="#d9e5f5" stroke-width="3" filter="url(#shadow)"/>
  <circle cx="960" cy="455" r="42" fill="#1b73b9"/>
  <path d="M960 431c10 0 18 8 18 18v4h4c10 0 18 8 18 18s-8 18-18 18h-4v4c0 10-8 18-18 18s-18-8-18-18v-4h-4c-10 0-18-8-18-18s8-18 18-18h4v-4c0-10 8-18 18-18z" fill="#ffffff"/>
  <text x="960" y="575" text-anchor="middle" class="center">AFYA</text>

  <!-- 1 Patient -->
  <rect x="110" y="440" width="360" height="165" rx="22" class="card" stroke="#0f92a0"/>
  <circle cx="175" cy="520" r="50" fill="#0f92a0"/>
  <circle cx="175" cy="500" r="18" fill="#ffffff"/>
  <path d="M135 552c10-28 70-28 80 0z" fill="#ffffff"/>
  <rect x="110" y="440" width="360" height="42" rx="21" fill="#0f92a0"/>
  <text x="240" y="468" text-anchor="middle" class="small">1. PATIENT</text>
  <text x="230" y="510" class="text">
    <tspan x="230" dy="0">• Consulte ses traitements</tspan>
    <tspan x="230" dy="28">• Reçoit des rappels</tspan>
    <tspan x="230" dy="28">• Accède aux ordonnances</tspan>
    <tspan x="230" dy="28">• Recherche des médicaments</tspan>
  </text>

  <!-- 2 Medecin particulier -->
  <rect x="635" y="70" width="360" height="180" rx="22" class="card" stroke="#1f9d55"/>
  <circle cx="700" cy="158" r="50" fill="#1f9d55"/>
  <path d="M680 142c0-18 12-30 30-30s30 12 30 30c0 22-14 40-30 40s-30-18-30-40z" fill="#ffffff"/>
  <path d="M665 204c16-34 74-34 90 0" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
  <rect x="635" y="70" width="360" height="42" rx="21" fill="#1f9d55"/>
  <text x="815" y="98" text-anchor="middle" class="small">2. MÉDECIN PARTICULIER</text>
  <text x="720" y="145" class="text">
    <tspan x="720" dy="0">• Suit ses patients</tspan>
    <tspan x="720" dy="28">• Crée des prescriptions</tspan>
    <tspan x="720" dy="28">• Génère ordonnances PDF/QR</tspan>
    <tspan x="720" dy="28">• Consulte l'historique médical</tspan>
  </text>

  <!-- 3 Pharmacien particulier -->
  <rect x="1160" y="120" width="380" height="180" rx="22" class="card" stroke="#f28b20"/>
  <circle cx="1225" cy="208" r="50" fill="#f28b20"/>
  <rect x="1205" y="185" width="40" height="55" rx="8" fill="#ffffff"/>
  <rect x="1212" y="175" width="26" height="15" rx="4" fill="#ffffff"/>
  <path d="M1225 196v28M1211 210h28" stroke="#f28b20" stroke-width="7" stroke-linecap="round"/>
  <rect x="1160" y="120" width="380" height="42" rx="21" fill="#f28b20"/>
  <text x="1350" y="148" text-anchor="middle" class="small">3. PHARMACIEN PARTICULIER</text>
  <text x="1250" y="195" class="text">
    <tspan x="1250" dy="0">• Gère son stock</tspan>
    <tspan x="1250" dy="28">• Scanne les ordonnances</tspan>
    <tspan x="1250" dy="28">• Traite les demandes</tspan>
    <tspan x="1250" dy="28">• Transfère des médicaments</tspan>
  </text>

  <!-- 4 Medecin etablissement -->
  <rect x="1310" y="500" width="410" height="180" rx="22" class="card" stroke="#2b74c7"/>
  <circle cx="1375" cy="588" r="50" fill="#2b74c7"/>
  <path d="M1355 628v-70h50v70M1348 628h64M1365 575h10M1385 575h10M1365 595h10M1385 595h10" stroke="#ffffff" stroke-width="8" stroke-linecap="round" fill="none"/>
  <rect x="1310" y="500" width="410" height="42" rx="21" fill="#2b74c7"/>
  <text x="1515" y="528" text-anchor="middle" class="small">4. MÉDECIN D'ÉTABLISSEMENT</text>
  <text x="1400" y="575" class="text">
    <tspan x="1400" dy="0">• Suit les patients affectés</tspan>
    <tspan x="1400" dy="28">• Gère les prescriptions</tspan>
    <tspan x="1400" dy="28">• Coordonne avec l'équipe</tspan>
    <tspan x="1400" dy="28">• Consulte les rapports</tspan>
  </text>

  <!-- 5 Infirmier -->
  <rect x="1110" y="805" width="390" height="165" rx="22" class="card" stroke="#7d4cc2"/>
  <circle cx="1175" cy="887" r="50" fill="#7d4cc2"/>
  <path d="M1152 868h46v38c0 20-46 20-46 0z" fill="#ffffff"/>
  <path d="M1162 858h26M1175 850v26M1164 863h22" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
  <rect x="1110" y="805" width="390" height="42" rx="21" fill="#7d4cc2"/>
  <text x="1305" y="833" text-anchor="middle" class="small">5. INFIRMIER(ÈRE)</text>
  <text x="1200" y="880" class="text">
    <tspan x="1200" dy="0">• Administre les traitements</tspan>
    <tspan x="1200" dy="28">• Suit les rappels patients</tspan>
    <tspan x="1200" dy="28">• Signale les incidents</tspan>
    <tspan x="1200" dy="28">• Coordonne les soins</tspan>
  </text>

  <!-- 6 Administrateur -->
  <rect x="635" y="805" width="390" height="165" rx="22" class="card" stroke="#d1324c"/>
  <circle cx="700" cy="887" r="50" fill="#d1324c"/>
  <path d="M700 848l38 18v28c0 30-24 48-38 54-14-6-38-24-38-54v-28z" fill="#ffffff"/>
  <path d="M700 875v36M682 893h36" stroke="#d1324c" stroke-width="8" stroke-linecap="round"/>
  <rect x="635" y="805" width="390" height="42" rx="21" fill="#d1324c"/>
  <text x="830" y="833" text-anchor="middle" class="small">6. ADMINISTRATEUR</text>
  <text x="725" y="880" class="text">
    <tspan x="725" dy="0">• Gère utilisateurs et rôles</tspan>
    <tspan x="725" dy="28">• Supervise les établissements</tspan>
    <tspan x="725" dy="28">• Contrôle stock et ordonnances</tspan>
    <tspan x="725" dy="28">• Consulte audit et alertes</tspan>
  </text>

  <!-- 7 Inspecteur -->
  <rect x="105" y="685" width="390" height="165" rx="22" class="card" stroke="#213a85"/>
  <circle cx="170" cy="767" r="50" fill="#213a85"/>
  <path d="M140 800h65M150 790v-45M170 790v-70M190 790v-35" stroke="#ffffff" stroke-width="9" stroke-linecap="round"/>
  <circle cx="205" cy="730" r="18" fill="none" stroke="#ffffff" stroke-width="8"/>
  <line x1="218" y1="744" x2="238" y2="764" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
  <rect x="105" y="685" width="390" height="42" rx="21" fill="#213a85"/>
  <text x="300" y="713" text-anchor="middle" class="small">7. INSPECTEUR</text>
  <text x="195" y="760" class="text">
    <tspan x="195" dy="0">• Consulte les signalements</tspan>
    <tspan x="195" dy="28">• Analyse les alertes</tspan>
    <tspan x="195" dy="28">• Suit les statistiques</tspan>
    <tspan x="195" dy="28">• Contrôle les anomalies</tspan>
  </text>

  <!-- 8 Etablissement -->
  <rect x="85" y="120" width="420" height="180" rx="22" class="card" stroke="#1aa5bd"/>
  <circle cx="150" cy="208" r="50" fill="#1aa5bd"/>
  <path d="M120 240v-70h60v70M105 240h90M135 185h10M158 185h10M135 205h10M158 205h10" stroke="#ffffff" stroke-width="8" stroke-linecap="round" fill="none"/>
  <rect x="85" y="120" width="420" height="42" rx="21" fill="#1aa5bd"/>
  <text x="295" y="148" text-anchor="middle" class="small">8. ÉTABLISSEMENT DE SANTÉ</text>
  <text x="175" y="195" class="text">
    <tspan x="175" dy="0">• Gère son personnel</tspan>
    <tspan x="175" dy="28">• Affecte médecins/infirmiers</tspan>
    <tspan x="175" dy="28">• Supervise activités</tspan>
    <tspan x="175" dy="28">• Centralise les données</tspan>
  </text>
</svg>
